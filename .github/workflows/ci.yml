name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          target: dev
          load: true
          tags: aws-tools:dev
          cache-from: type=gha,scope=dev
          cache-to: type=gha,scope=dev,mode=max

      - name: Lint
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD":/work -w /work \
            aws-tools:dev task lint

      - name: Unit tests
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD":/work -w /work \
            aws-tools:dev task test

  validate-runtime-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: false
          load: true
          tags: aws-tools:runtime-ci
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max

      - name: Smoke test runtime image
        run: |
          docker run --rm aws-tools:runtime-ci --version
          docker run --rm aws-tools:runtime-ci --help | grep -q "Usage: awst"
