name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ci

      - name: Cross-compile release targets
        run: |
          for target in windows/amd64 windows/arm64 darwin/amd64 darwin/arm64; do
            echo "building $target"
            GOOS=${target%/*} GOARCH=${target#*/} go build ./...
          done

  # Runs the unit tests natively on Windows so the windows-tagged code
  # (kill_windows, scan_windows + CommandLineToArgvW, path resolution) is
  # actually exercised, not just cross-compiled. The bash acceptance scripts
  # stay on the ubuntu job — they're unix-only.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go build ./...
      - run: go test ./...
