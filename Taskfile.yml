---
version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the Go binary to dist/awst
    cmds:
      - go build -ldflags "-X github.com/kedwards/awst/v3/cmd.version=$(cat VERSION)" -o dist/awst ./
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - dist/awst

  test:
    desc: Run Go unit tests
    cmds:
      - go test ./...

  acceptance:
    desc: Smoke-test the built binary against fixture creds dirs
    deps: [build]
    cmds:
      - bash test/acceptance/creds.sh
      - bash test/acceptance/login.sh
      - bash test/acceptance/connect.sh
      - bash test/acceptance/sessions.sh
      - bash test/acceptance/exec.sh
      - bash test/acceptance/run.sh

  ci:
    desc: Run all checks (CI)
    deps:
      - test
      - acceptance

  ext:build:
    desc: Build (and lint) the awst Containers Firefox extension into ./dist
    cmds:
      - npx --yes web-ext build --source-dir=extension --artifacts-dir=dist --overwrite-dest --ignore-files='*.xpi'

  ext:sign:
    desc: Sign the extension as an unlisted XPI (needs WEB_EXT_API_KEY / WEB_EXT_API_SECRET)
    cmds:
      # Sign, then publish under the stable name the release + install helper expect.
      # web-ext names the artifact <amo-slug>-<version>.xpi; normalize it.
      - npx --yes web-ext sign --source-dir=extension --channel=unlisted --artifacts-dir=dist --ignore-files='*.xpi'
      - cp "$(ls -t dist/*.xpi | head -1)" extension/awst-containers.xpi
      - echo "Signed extension -> extension/awst-containers.xpi (commit it; goreleaser attaches it on release)"

  version:
    desc: Show current version
    cmds:
      - cat VERSION
    silent: true

  release-check:
    desc: Validate .goreleaser.yml without building
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@latest check

  release-snapshot:
    desc: Build release artifacts locally (no publish) into ./dist
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean --skip=publish
