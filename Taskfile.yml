---
version: "3"

vars:
  BATS: bats
  SHELLCHECK: shellcheck
  DOCKER: docker
  DEV_IMAGE: aws-tools:dev
  RUNTIME_IMAGE: aws-tools:runtime

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run unit tests only (No AWS auth)
    cmds:
      - "{{.BATS}} test/unit"
    silent: false

  test:integration:
    desc: Run integration tests (Requires AWS auth)
    cmds:
      - "{{.BATS}} test/integration"

  lint:
    desc: Run shellcheck
    cmds:
      - "{{.SHELLCHECK}} -e SC1091 lib/menu/index.sh"

  ci:
    desc: Run all checks (CI)
    deps:
      - lint
      - test
      - go:test
      - go:acceptance

  go:build:
    desc: Build the Go binary to dist/awst
    cmds:
      - go build -o dist/awst ./
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - dist/awst

  go:test:
    desc: Run Go unit tests
    cmds:
      - go test ./...

  go:acceptance:
    desc: Smoke-test the built binary against fixture creds dirs
    deps: [go:build]
    cmds:
      - bash test/acceptance/creds.sh

  version:
    desc: Show current version
    cmds:
      - cat VERSION
    silent: true

  release:patch:
    desc: Create a patch release (bug fixes)
    cmds:
      - ./scripts/release.sh patch

  release:minor:
    desc: Create a minor release (new features)
    cmds:
      - ./scripts/release.sh minor

  release:major:
    desc: Create a major release (breaking changes)
    cmds:
      - ./scripts/release.sh major

  release:
    desc: Create a release (interactive)
    cmds:
      - ./scripts/release.sh

  docker:build:
    desc: Build the dev image (skipped if Dockerfile unchanged)
    cmds:
      - "{{.DOCKER}} build --target dev -f containers/Dockerfile -t {{.DEV_IMAGE}} ."
    sources:
      - containers/Dockerfile
    method: checksum

  docker:test:
    desc: Run unit tests inside the dev image
    deps: [docker:build]
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --user $(id -u):$(id -g)
        -e HOME=/tmp
        -v "$PWD":/work -w /work
        {{.DEV_IMAGE}} task test

  docker:lint:
    desc: Run shellcheck inside the dev image
    deps: [docker:build]
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --user $(id -u):$(id -g)
        -e HOME=/tmp
        -v "$PWD":/work -w /work
        {{.DEV_IMAGE}} task lint

  docker:ci:
    desc: Run lint + unit tests inside the dev image
    deps: [docker:build]
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --user $(id -u):$(id -g)
        -e HOME=/tmp
        -v "$PWD":/work -w /work
        {{.DEV_IMAGE}} task ci

  docker:shell:
    desc: Interactive shell in the dev image (repo at /work)
    deps: [docker:build]
    cmds:
      - >-
        {{.DOCKER}} run --rm -it
        --user $(id -u):$(id -g)
        -e HOME=/tmp
        -v "$PWD":/work -w /work
        {{.DEV_IMAGE}} bash

  docker:build:runtime:
    desc: Build the runtime image (slim, used by containers/awst-host)
    cmds:
      - >-
        {{.DOCKER}} build
        --target runtime
        -f containers/Dockerfile
        -t {{.RUNTIME_IMAGE}} .
    sources:
      - containers/Dockerfile
      - containers/entrypoint.sh
      - bin/awst
      - VERSION
      - lib/**/*
      - examples/commands/**/*
    method: checksum

  docker:push:runtime:
    desc: Build and push the runtime image to GHCR (manual fallback)
    vars:
      GHCR_IMAGE: ghcr.io/kedwards/aws-tools
    cmds:
      - >-
        {{.DOCKER}} buildx build
        --target runtime
        -f containers/Dockerfile
        -t {{.GHCR_IMAGE}}:v$(cat VERSION)
        -t {{.GHCR_IMAGE}}:latest
        --platform linux/amd64,linux/arm64
        --push
        .
